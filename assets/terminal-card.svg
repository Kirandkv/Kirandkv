<svg width="980" height="230" viewBox="0 0 980 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg{fill:#0d1117;stroke:#1f6feb;stroke-opacity:.35;stroke-width:2}
    .bar{fill:#161b22}
    .txt{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size:24px; fill:#39dce2}
    .muted{fill:#8b949e}
    .line{opacity:0; animation: show 7.5s infinite}
    .l1{animation-delay:0s}.l2{animation-delay:.8s}.l3{animation-delay:1.6s}.l4{animation-delay:2.4s}.l5{animation-delay:3.2s}
    .cursor{animation: blink 1s steps(2,start) infinite}
    @keyframes show{0%,8%{opacity:0} 12%,86%{opacity:1} 100%{opacity:0}}
    @keyframes blink{0%,45%{opacity:1} 46%,100%{opacity:0}}
    .glow{filter: drop-shadow(0 0 8px rgba(57,220,226,.55));}
  </style>
  <rect x="8" y="8" width="964" height="214" rx="18" class="bg"/>
  <rect x="8" y="8" width="964" height="44" rx="18" class="bar"/>
  <circle cx="34" cy="30" r="7" fill="#ff5f56"/><circle cx="58" cy="30" r="7" fill="#ffbd2e"/><circle cx="82" cy="30" r="7" fill="#27c93f"/>
  <text x="110" y="38" class="txt muted">terminal.init()</text>
  <g class="glow">
    <text x="38" y="88" class="txt line l1">&gt; building ideas</text>
    <text x="38" y="120" class="txt line l2">&gt; training models</text>
    <text x="38" y="152" class="txt line l3">&gt; capturing moments</text>
    <text x="38" y="184" class="txt line l4">&gt; exploring the world</text>
    <text x="410" y="184" class="txt line l5">&gt; sitting down, coding, and relaxing</text>
    <rect x="922" y="166" width="14" height="26" rx="2" fill="#39dce2" class="cursor"/>
  </g>
</svg>